# ============================================================
#  Mugiwara Store — Orquestração de containers
#  Sobe: banco (PostgreSQL 16) + API (FastAPI) + Web (Vue/Nginx)
# ============================================================

services:
  # ---------------------------------------------------------
  #  Banco de dados relacional
  # ---------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: mugiwara_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mugiwara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grandline2026}
      POSTGRES_DB: ${POSTGRES_DB:-mugiwara_store}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Scripts em initdb.d rodam automaticamente na primeira inicialização
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mugiwara} -d ${POSTGRES_DB:-mugiwara_store}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------
  #  API — FastAPI
  # ---------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mugiwara_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-mugiwara}:${POSTGRES_PASSWORD:-grandline2026}@db:5432/${POSTGRES_DB:-mugiwara_store}
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-em-producao-0d5f3b8a9c1e2f4a6b8d0c2e4f6a8b0d}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost:8080,http://localhost}
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/app/static/uploads

  # ---------------------------------------------------------
  #  Web — Frontend Vue servido pelo Nginx
  # ---------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    container_name: mugiwara_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
  uploads:
